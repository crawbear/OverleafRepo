services:
  overleaf:
    image: koehlerlukas/overleaf:latest
    container_name: overleaf-app
    restart: unless-stopped
    depends_on:
      - mongo
      - redis
    ports:
      - "127.0.0.1:${OVERLEAF_PORT:-9100}:8080"
    environment:
      OVERLEAF_APP_NAME: ${OVERLEAF_APP_NAME:-Overleaf Community}
      OVERLEAF_MONGO_URL: mongodb://mongo:27017/overleaf?replicaSet=overleaf&directConnection=true&serverSelectionTimeoutMS=300000
      OVERLEAF_REDIS_HOST: redis
      ENABLED_LINKED_FILE_TYPES: project_file,project_output_file
      OVERLEAF_SITE_URL: ${OVERLEAF_SITE_URL:-http://localhost:9100}
      OVERLEAF_NAV_TITLE: ${OVERLEAF_NAV_TITLE:-OverLeafSelf}
      OVERLEAF_SECURE_COOKIE: ${OVERLEAF_SECURE_COOKIE:-false}
      OVERLEAF_BEHIND_PROXY: ${OVERLEAF_BEHIND_PROXY:-false}
      EMAIL_CONFIRMATION_DISABLED: ${EMAIL_CONFIRMATION_DISABLED:-true}
      OVERLEAF_ADMIN_EMAIL: ${OVERLEAF_ADMIN_EMAIL:-admin@example.com}
      OVERLEAF_ADMIN_PASSWORD: ${OVERLEAF_ADMIN_PASSWORD:-change-me-now}
      SHARELATEX_APP_NAME: ${OVERLEAF_APP_NAME:-Overleaf Community}
      SHARELATEX_MONGO_URL: mongodb://mongo:27017/sharelatex?replicaSet=overleaf&directConnection=true&serverSelectionTimeoutMS=300000
      SHARELATEX_REDIS_HOST: redis
      SHARELATEX_SITE_URL: ${OVERLEAF_SITE_URL:-http://localhost:9100}
      SHARELATEX_NAV_TITLE: ${OVERLEAF_NAV_TITLE:-OverLeafSelf}
      SHARELATEX_SECURE_COOKIE: ${OVERLEAF_SECURE_COOKIE:-false}
      SHARELATEX_BEHIND_PROXY: ${OVERLEAF_BEHIND_PROXY:-false}
      SHARELATEX_ADMIN_EMAIL: ${OVERLEAF_ADMIN_EMAIL:-admin@example.com}
    volumes:
      - overleaf-data:/var/lib/overleaf
      - overleaf-logs:/var/log/overleaf

  mongo:
    image: mongo:6
    container_name: overleaf-mongo
    restart: unless-stopped
    command: --replSet overleaf
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    container_name: overleaf-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

volumes:
  overleaf-data:
  overleaf-logs:
  mongo-data:
  redis-data:
